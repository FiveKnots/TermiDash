<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TermiDash</title>

  <!-- External Scripts & Styles -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Injected Components -->
  <div id="header-placeholder"></div>
  <div id="nav-placeholder"></div>

  <!-- ===== MAIN DASHBOARD ===== -->
  <div id="tab-dashboard" class="tab-panel active">
    <!-- FILTERS, KPI CARDS, CHARTS, AND TABLES REMAIN HERE -->
    <!-- (Your existing dashboard content goes here) -->
  </div>

  <!-- Empty & Loading States -->
  <div id="empty-state" class="empty-state">...</div>
  <div id="loading-overlay" class="loading-overlay">...</div>

  <!-- Component Loader -->
  <script>
    async function loadComponents() {
      const res = await fetch('components.html');
      const text = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      document.getElementById('header-placeholder').innerHTML = doc.querySelector('.header').outerHTML;
      document.getElementById('nav-placeholder').innerHTML = doc.querySelector('.tab-nav').outerHTML;
    }
    loadComponents();
  </script>

  <!-- App Scripts -->
  <script src="js/app.js"></script>
  <script src="js/repo.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
